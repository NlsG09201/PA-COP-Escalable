server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cop-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 10000
            response-timeout: 60s
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:5174"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - Authorization
                allowCredentials: false
                maxAge: 3600
          default-filters:
            - AddRequestHeader=X-Request-Source, api-gateway
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
          routes:
            - id: iam
              uri: http://iam-service:8080
              predicates:
                - Path=/api/auth/**

            # Direct to legacy: avoids extra hop via tenancy-service (reduces 504/empty responses on cold start).
            - id: public-legacy
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/public/**

            - id: patients
              uri: http://patients-service:8080
              predicates:
                - Path=/api/patients/**

            - id: appointments-assignments-legacy
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/appointments/assignments/**

            - id: appointments
              uri: http://appointments-service:8080
              predicates:
                - Path=/api/appointments/**

            - id: clinical
              uri: http://clinical-service:8080
              predicates:
                - Path=/api/clinical/**

            - id: odontogram
              uri: http://odontogram-service:8080
              predicates:
                - Path=/api/odontogram/**

            - id: psych-tests
              uri: http://psych-tests-service:8080
              predicates:
                - Path=/api/psych-tests/**

            - id: ai-assist
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/ai-assist/**

            - id: psychology
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/psychology/**

            - id: odontology
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/odontology/**

            - id: diagnosis
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/diagnosis/**

            - id: emotion
              uri: ${EMOTION_ANALYSIS_URI:http://emotion-analysis-service:8091}
              predicates:
                - Path=/api/emotion/**

            - id: recommendations
              uri: ${RECOMMENDATION_ENGINE_URI:http://recommendation-engine:8092}
              predicates:
                - Path=/api/recommendations/**

            - id: relapse
              uri: ${RECOMMENDATION_ENGINE_URI:http://recommendation-engine:8092}
              predicates:
                - Path=/api/relapse/**

            - id: simulation
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/simulation/**

            - id: followup
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/followup/**

            - id: budget
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/budget/**

            - id: therapy
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/therapy/**

            - id: copilot
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/copilot/**

            - id: experience
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/experience/**

            - id: portal
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/portal/**

            - id: files
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/api/files/**

            # Strangler: todo al legacy mientras se extrae por servicio
            - id: legacy-all
              uri: ${LEGACY_URI:http://legacy-backend:8080}
              predicates:
                - Path=/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

