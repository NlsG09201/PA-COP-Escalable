server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cop-iam-service

app:
  legacy:
    base-url: ${LEGACY_BASE_URL:http://legacy-backend:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

