services:
  mongodb-keyfile:
    image: alpine:3.20
    security_opt:
      - no-new-privileges:true
    environment:
      # Dev default. Override by editing this value (or add an .env and replace it here).
      # Must be base64-like (avoid '_' and other unsupported chars).
      MONGO_REPLICA_SET_KEY: cG9wZGV2cmVwbGljYXNldGtleQ==
    volumes:
      - mongodb_keyfile:/keyfile
    command:
      - sh
      - -lc
      - |
        umask 077
        if [ -z "$$MONGO_REPLICA_SET_KEY" ]; then echo "MONGO_REPLICA_SET_KEY is empty" && exit 1; fi
        printf "%s\n" "$$MONGO_REPLICA_SET_KEY" > /keyfile/mongo-keyfile
        chown 999:999 /keyfile/mongo-keyfile
        chmod 400 /keyfile/mongo-keyfile
        echo "keyfile ready"

  mongodb:
    image: mongo:7
    security_opt:
      - no-new-privileges:true
    command: ["mongod","--replSet","rs0","--bind_ip_all","--keyFile","/etc/mongo-keyfile/mongo-keyfile"]
    environment:
      MONGO_INITDB_DATABASE: cop
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-cop}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_keyfile:/etc/mongo-keyfile:ro
    depends_on:
      mongodb-keyfile:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch(e) { 0 }\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - >
        for i in {1..60}; do
          mongosh "mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/admin?authSource=admin" --quiet --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }" && exit 0;
          sleep 1;
        done;
        echo "Mongo replica set init failed" && exit 1;

  redis:
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  legacy-backend:
    build:
      context: ./Backend
    security_opt:
      - no-new-privileges:true
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin&uuidRepresentation=standard&replicaSet=rs0&retryWrites=true
      MONGODB_AUTO_INDEX_CREATION: ${MONGODB_AUTO_INDEX_CREATION:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SEC_ISSUER: ${SEC_ISSUER:-http://localhost:8080}
      # TOTP MFA: set APP_SECURITY_MFA_AES_KEY_BASE64 (32-byte key, base64) in production when MFA is used.
      APP_SECURITY_MFA_AES_KEY_BASE64: ${APP_SECURITY_MFA_AES_KEY_BASE64:-}
      APP_SECURITY_MFA_ISSUER: ${APP_SECURITY_MFA_ISSUER:-COP}
      AUTH_MFA_VERIFY_RATE_LIMIT_PER_MIN: ${AUTH_MFA_VERIFY_RATE_LIMIT_PER_MIN:-30}
      AUTH_MFA_SETUP_RATE_LIMIT_PER_MIN: ${AUTH_MFA_SETUP_RATE_LIMIT_PER_MIN:-10}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME:-admin@cop.local}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-Admin123ChangeMe}
      PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER: ${PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER:-SANDBOX}
      PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL: ${PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL:-http://localhost:5174}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:-always}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED:-false}
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s

  iam-service:
    build:
      context: ./services/iam-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  tenancy-service:
    build:
      context: ./services/tenancy-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  patients-service:
    build:
      context: ./services/patients-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  appointments-service:
    build:
      context: ./services/appointments-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  clinical-service:
    build:
      context: ./services/clinical-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  odontogram-service:
    build:
      context: ./services/odontogram-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  psych-tests-service:
    build:
      context: ./services/psych-tests-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  ai-diagnosis-service:
    build:
      context: ./services/ai-diagnosis-service
    environment:
      DIAG_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin
      DIAG_MONGODB_DB: cop
      DIAG_REDIS_HOST: redis
      DIAG_REDIS_PORT: 6379
      DIAG_MODEL_DEVICE: cpu
    depends_on:
      - mongodb
      - redis
    volumes:
      - models_data:/app/app/ml/weights

  emotion-analysis-service:
    build:
      context: ./services/emotion-analysis-service
    environment:
      EMOTION_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin
      EMOTION_MONGODB_DB: cop
      EMOTION_REDIS_HOST: redis
      EMOTION_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - models_data:/app/app/ml/weights

  recommendation-engine:
    build:
      context: ./services/recommendation-engine
    environment:
      RECO_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin
      RECO_MONGODB_DB: cop
      RECO_REDIS_HOST: redis
      RECO_REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - models_data:/app/app/ml/weights

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      SERVER_PORT: 8080
      LEGACY_URI: http://legacy-backend:8080
      AI_DIAGNOSIS_URI: http://ai-diagnosis-service:8090
      EMOTION_ANALYSIS_URI: http://emotion-analysis-service:8091
      RECOMMENDATION_ENGINE_URI: http://recommendation-engine:8092
    ports:
      - "8080:8080"
    depends_on:
      legacy-backend:
        condition: service_healthy
      iam-service:
        condition: service_started
      patients-service:
        condition: service_started
      appointments-service:
        condition: service_started
      clinical-service:
        condition: service_started
      odontogram-service:
        condition: service_started
      psych-tests-service:
        condition: service_started
      ai-diagnosis-service:
        condition: service_started
      emotion-analysis-service:
        condition: service_started
      recommendation-engine:
        condition: service_started

  dashboard:
    build:
      context: ./Frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  publicweb:
    build:
      context: ./PublicWeb
      args:
        API_BASE_URL: ${PUBLICWEB_API_BASE_URL:-http://localhost:8080}
        DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:5173}
    ports:
      - "5174:80"
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
  models_data:
  mongodb_keyfile:

