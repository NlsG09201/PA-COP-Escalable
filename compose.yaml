services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cop}
      POSTGRES_USER: ${POSTGRES_USER:-cop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cop_dev_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: cop
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-cop}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  legacy-backend:
    build:
      context: ./Backend
    environment:
      SERVER_PORT: 8080
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cop}
      POSTGRES_USER: ${POSTGRES_USER:-cop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cop_dev_password_change_me}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin&uuidRepresentation=standard
      SEC_ISSUER: ${SEC_ISSUER:-http://localhost:8080}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME:-admin@cop.local}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-Admin123ChangeMe}
      PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER: ${PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER:-SANDBOX}
      PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL: ${PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL:-http://localhost:5174}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      # Existing local databases may predate Flyway; keep update for compatibility.
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:-always}
    depends_on:
      - postgres
      - mongodb

  iam-service:
    build:
      context: ./services/iam-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  tenancy-service:
    build:
      context: ./services/tenancy-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  patients-service:
    build:
      context: ./services/patients-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  appointments-service:
    build:
      context: ./services/appointments-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  clinical-service:
    build:
      context: ./services/clinical-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  odontogram-service:
    build:
      context: ./services/odontogram-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  psych-tests-service:
    build:
      context: ./services/psych-tests-service
    environment:
      SERVER_PORT: 8080
      LEGACY_BASE_URL: http://legacy-backend:8080
    depends_on:
      - legacy-backend

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      SERVER_PORT: 8080
      LEGACY_URI: http://legacy-backend:8080
    ports:
      - "8080:8080"
    depends_on:
      - iam-service
      - tenancy-service
      - patients-service
      - appointments-service
      - clinical-service
      - odontogram-service
      - psych-tests-service
      - legacy-backend

  dashboard:
    build:
      context: ./Frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  publicweb:
    build:
      context: ./PublicWeb
      args:
        API_BASE_URL: ${PUBLICWEB_API_BASE_URL:-http://localhost:8080}
        DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:5173}
    ports:
      - "5174:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongodb_data:

