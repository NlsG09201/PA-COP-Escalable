server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: cop-backend
  profiles:
    default: local
  autoconfigure:
    exclude:
      - org.springframework.modulith.events.mongodb.MongoDbTransactionAutoConfiguration
      - org.springframework.modulith.events.mongodb.MongoDbEventPublicationAutoConfiguration
      - org.springframework.modulith.events.config.EventPublicationAutoConfiguration

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cop}
    username: ${POSTGRES_USER:cop}
    password: ${POSTGRES_PASSWORD:cop_dev_password_change_me}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  mongodb:
    uri: ${MONGODB_URI:mongodb://cop:cop_dev_password_change_me@localhost:27017/cop?authSource=admin&uuidRepresentation=standard}
    uuid-representation: standard
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

  jackson:
    time-zone: UTC

management:
  health:
    mongo:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger

app:
  security:
    issuer: ${SEC_ISSUER:http://localhost:8080}
    jwt:
      key-id: ${SEC_JWT_KID:local-dev-1}
      # For local/dev only. In prod, inject via secrets/keystore.
      rsa-private-key-pem: ${SEC_JWT_RSA_PRIVATE_PEM:}
      rsa-public-key-pem: ${SEC_JWT_RSA_PUBLIC_PEM:}
  public-booking:
    payments:
      default-provider: ${PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER:SANDBOX}
      sandbox:
        checkout-base-url: ${PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL:http://localhost:4200}
    notifications:
      email:
        enabled: ${PUBLIC_BOOKING_EMAIL_NOTIFICATIONS_ENABLED:true}
        template-code: ${PUBLIC_BOOKING_EMAIL_TEMPLATE_CODE:booking-confirmation-email}
      whatsapp:
        enabled: ${PUBLIC_BOOKING_WHATSAPP_NOTIFICATIONS_ENABLED:true}
        template-code: ${PUBLIC_BOOKING_WHATSAPP_TEMPLATE_CODE:booking-confirmation-whatsapp}
  notifications:
    redis:
      stream: ${NOTIFICATIONS_REDIS_STREAM:cop:notifications:appointments}
      consumer-group: ${NOTIFICATIONS_REDIS_CONSUMER_GROUP:notifications-workers}
      consumer-name: ${NOTIFICATIONS_REDIS_CONSUMER_NAME:}
      batch-size: ${NOTIFICATIONS_REDIS_BATCH_SIZE:20}
      relay-poll-delay-ms: ${NOTIFICATIONS_REDIS_RELAY_POLL_DELAY_MS:2000}
      consumer-poll-delay-ms: ${NOTIFICATIONS_REDIS_CONSUMER_POLL_DELAY_MS:1000}
      retry-poll-delay-ms: ${NOTIFICATIONS_REDIS_RETRY_POLL_DELAY_MS:2000}
      read-block-ms: ${NOTIFICATIONS_REDIS_READ_BLOCK_MS:1000}
      claim-idle-time-ms: ${NOTIFICATIONS_REDIS_CLAIM_IDLE_TIME_MS:60000}
    retry:
      max-attempts: ${NOTIFICATIONS_RETRY_MAX_ATTEMPTS:5}
      initial-backoff-ms: ${NOTIFICATIONS_RETRY_INITIAL_BACKOFF_MS:10000}
      multiplier: ${NOTIFICATIONS_RETRY_MULTIPLIER:2.0}
      max-backoff-ms: ${NOTIFICATIONS_RETRY_MAX_BACKOFF_MS:300000}
    reminder:
      enabled: ${NOTIFICATIONS_REMINDER_ENABLED:true}
      lead-time-minutes: ${NOTIFICATIONS_REMINDER_LEAD_TIME_MINUTES:1440}
      poll-delay-ms: ${NOTIFICATIONS_REMINDER_POLL_DELAY_MS:60000}
    medical-alerts:
      enabled: ${NOTIFICATIONS_MEDICAL_ALERTS_ENABLED:true}
      severity-routes:
        low: [PATIENT]
        medium: [PATIENT]
        high: [PATIENT, PROFESSIONALS]
        critical: [PATIENT, PROFESSIONALS, ADMINS]
      # Contactos staff/admin por sede: BD vía /api/notifications/medical-alert-contacts (JWT site_id)
      # o /api/notifications/medical-alert-contacts/by-site/{siteId} (solo ADMIN/ORG_ADMIN, misma organization_id del JWT).
      # Estos bloques siguen sirviendo como fallback o capa global opcional.
      default-contacts:
        professionals:
          email: []
          whatsapp: []
        admins:
          email: []
          whatsapp: []
      site-severity-routes: {}
      site-contacts: {}
    email:
      enabled: ${NOTIFICATIONS_EMAIL_ENABLED:true}
      provider: ${NOTIFICATIONS_EMAIL_PROVIDER:LOG}
      from-address: ${NOTIFICATIONS_EMAIL_FROM:no-reply@cop.local}
      subject-prefix: ${NOTIFICATIONS_EMAIL_SUBJECT_PREFIX:[COP]}
    whatsapp:
      enabled: ${NOTIFICATIONS_WHATSAPP_ENABLED:true}
      provider: ${NOTIFICATIONS_WHATSAPP_PROVIDER:LOG}
      base-url: ${NOTIFICATIONS_WHATSAPP_BASE_URL:https://graph.facebook.com/v23.0}
      api-token: ${NOTIFICATIONS_WHATSAPP_API_TOKEN:}
      phone-number-id: ${NOTIFICATIONS_WHATSAPP_PHONE_NUMBER_ID:}
  tenancy:
    mode: shared-schema
  analytics:
    cache-ttl-seconds: ${ANALYTICS_CACHE_TTL_SECONDS:60}
  diagnosis:
    service-url: ${DIAGNOSIS_SERVICE_URL:http://localhost:8090}
    async: ${DIAGNOSIS_ASYNC:true}
    redis-stream:
      enabled: ${DIAGNOSIS_REDIS_STREAM_ENABLED:true}
      requests-key: ${DIAGNOSIS_REDIS_STREAM_REQUESTS:cop:diagnosis:requests}
      results-key: ${DIAGNOSIS_REDIS_STREAM_RESULTS:cop:diagnosis:results}
      consumer-group: ${DIAGNOSIS_REDIS_CONSUMER_GROUP:backend-diagnosis}
      consumer-name: ${DIAGNOSIS_REDIS_CONSUMER_NAME:}
      poll-delay-ms: ${DIAGNOSIS_REDIS_POLL_MS:2000}
      batch-size: ${DIAGNOSIS_REDIS_BATCH_SIZE:10}
      read-block-ms: ${DIAGNOSIS_REDIS_READ_BLOCK_MS:1000}
      claim-idle-time-ms: ${DIAGNOSIS_REDIS_CLAIM_IDLE_MS:60000}
  emotion:
    service-url: ${EMOTION_SERVICE_URL:http://localhost:8091}
    async: ${EMOTION_ASYNC:true}
    redis-stream:
      enabled: ${EMOTION_REDIS_STREAM_ENABLED:true}
      requests-key: ${EMOTION_REDIS_STREAM_REQUESTS:cop:emotion:requests}
      results-key: ${EMOTION_REDIS_STREAM_RESULTS:cop:emotion:results}
      consumer-group: ${EMOTION_REDIS_CONSUMER_GROUP:backend-emotion}
      consumer-name: ${EMOTION_REDIS_CONSUMER_NAME:}
      poll-delay-ms: ${EMOTION_REDIS_POLL_MS:2000}
      batch-size: ${EMOTION_REDIS_BATCH_SIZE:10}
      read-block-ms: ${EMOTION_REDIS_READ_BLOCK_MS:1000}
      claim-idle-time-ms: ${EMOTION_REDIS_CLAIM_IDLE_MS:60000}
  recommendation:
    service-url: ${RECOMMENDATION_SERVICE_URL:http://localhost:8092}
  simulation:
    max-phases: ${SIMULATION_MAX_PHASES:24}
    tooth-movement-rate-mm-per-month: ${SIMULATION_TOOTH_MOVEMENT_RATE:0.75}
  followup:
    enabled: ${FOLLOWUP_ENABLED:true}
    survey-delay-days: ${FOLLOWUP_SURVEY_DELAY_DAYS:7}
    control-appointment-days: ${FOLLOWUP_CONTROL_DAYS:30,90,180}
  budget:
    currency: ${BUDGET_CURRENCY:COP}
    tax-rate: ${BUDGET_TAX_RATE:0.19}
  therapy:
    enabled: ${THERAPY_ENABLED:true}
    max-daily-sessions: ${THERAPY_MAX_DAILY_SESSIONS:3}
  copilot:
    enabled: ${COPILOT_ENABLED:true}
    max-suggestions-per-session: ${COPILOT_MAX_SUGGESTIONS:20}
  experience:
    nps-enabled: ${EXPERIENCE_NPS_ENABLED:true}
    survey-cooldown-days: ${EXPERIENCE_SURVEY_COOLDOWN_DAYS:30}
  ai-assist:
    enabled: ${AI_ASSIST_ENABLED:true}
    async: ${AI_ASSIST_ASYNC:true}
    provider: ${AI_ASSIST_PROVIDER:STUB}
    base-url: ${AI_ASSIST_BASE_URL:https://api.openai.com}
    api-key: ${AI_ASSIST_API_KEY:}
    model: ${AI_ASSIST_MODEL:gpt-4o-mini}
    prompt-version: ${AI_ASSIST_PROMPT_VERSION:v1}
    alert-on-critical: ${AI_ASSIST_ALERT_ON_CRITICAL:false}
    http-timeout: ${AI_ASSIST_HTTP_TIMEOUT:60s}
    validate-output-schema: ${AI_ASSIST_VALIDATE_OUTPUT_SCHEMA:false}
    redis-stream:
      enabled: ${AI_ASSIST_REDIS_STREAM_ENABLED:true}
      stream-key: ${AI_ASSIST_REDIS_STREAM_KEY:cop:ai-assist:analysis}
      consumer-group: ${AI_ASSIST_REDIS_STREAM_GROUP:ai-assist-workers}
      consumer-name: ${AI_ASSIST_REDIS_STREAM_CONSUMER_NAME:}
      batch-size: ${AI_ASSIST_REDIS_STREAM_BATCH_SIZE:10}
      consumer-poll-delay-ms: ${AI_ASSIST_REDIS_STREAM_POLL_MS:1000}
      read-block-ms: ${AI_ASSIST_REDIS_STREAM_READ_BLOCK_MS:1000}
      claim-idle-time-ms: ${AI_ASSIST_REDIS_STREAM_CLAIM_IDLE_MS:60000}
