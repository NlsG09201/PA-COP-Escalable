services:
  backend:
    build:
      context: .
    environment:
      - SERVER_PORT=8080
      - JPA_DDL_AUTO=${JPA_DDL_AUTO:-validate}
      - SPRING_FLYWAY_ENABLED=${SPRING_FLYWAY_ENABLED:-true}
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cop}
      - POSTGRES_USER=${POSTGRES_USER:-cop}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cop_dev_password_change_me}
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - SEC_ISSUER=${SEC_ISSUER:-http://localhost:8080}
      - APP_BOOTSTRAP_ADMIN_USERNAME=${APP_BOOTSTRAP_ADMIN_USERNAME:-admin@cop.local}
      - APP_BOOTSTRAP_ADMIN_PASSWORD=${APP_BOOTSTRAP_ADMIN_PASSWORD:-Admin123ChangeMe}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mongodb

  mongodb:
    image: 'mongo:7'
    environment:
      - 'MONGO_INITDB_DATABASE=cop'
      - 'MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}'
      - 'MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-cop}'
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-cop}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cop_dev_password_change_me}'
      - 'POSTGRES_USER=${POSTGRES_USER:-cop}'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  mongodb_data:
