services:
  mongodb-keyfile:
    image: alpine:3.20
    security_opt:
      - no-new-privileges:true
    environment:
      # Dev default. Override by editing this value (or add an .env and replace it here).
      # Must be base64-like (avoid '_' and other unsupported chars).
      MONGO_REPLICA_SET_KEY: cG9wZGV2cmVwbGljYXNldGtleQ==
    volumes:
      - mongodb_keyfile:/keyfile
    command:
      - sh
      - -lc
      - |
        umask 077
        if [ -z "$$MONGO_REPLICA_SET_KEY" ]; then echo "MONGO_REPLICA_SET_KEY is empty" && exit 1; fi
        printf "%s\n" "$$MONGO_REPLICA_SET_KEY" > /keyfile/mongo-keyfile
        chown 999:999 /keyfile/mongo-keyfile
        chmod 400 /keyfile/mongo-keyfile
        echo "keyfile ready"

  backend:
    build:
      context: .
    security_opt:
      - no-new-privileges:true
    environment:
      - SERVER_PORT=8080
      - PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER=${PUBLIC_BOOKING_PAYMENTS_DEFAULT_PROVIDER:-SANDBOX}
      - PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL=${PUBLIC_BOOKING_SANDBOX_CHECKOUT_BASE_URL:-http://localhost:5174}
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/cop?authSource=admin&uuidRepresentation=standard&replicaSet=rs0&retryWrites=true
      - MONGODB_AUTO_INDEX_CREATION=${MONGODB_AUTO_INDEX_CREATION:-true}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - SEC_ISSUER=${SEC_ISSUER:-http://localhost:8080}
      - APP_BOOTSTRAP_ADMIN_USERNAME=${APP_BOOTSTRAP_ADMIN_USERNAME:-admin@cop.local}
      - APP_BOOTSTRAP_ADMIN_PASSWORD=${APP_BOOTSTRAP_ADMIN_PASSWORD:-Admin123ChangeMe}
      - APP_SECURITY_MFA_AES_KEY_BASE64=${APP_SECURITY_MFA_AES_KEY_BASE64:-}
      - APP_SECURITY_MFA_ISSUER=${APP_SECURITY_MFA_ISSUER:-COP}
      - AUTH_MFA_VERIFY_RATE_LIMIT_PER_MIN=${AUTH_MFA_VERIFY_RATE_LIMIT_PER_MIN:-30}
      - AUTH_MFA_SETUP_RATE_LIMIT_PER_MIN=${AUTH_MFA_SETUP_RATE_LIMIT_PER_MIN:-10}
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      - redis

  redis:
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  mongodb:
    image: 'mongo:7'
    security_opt:
      - no-new-privileges:true
    command: ["mongod","--replSet","rs0","--bind_ip_all","--keyFile","/etc/mongo-keyfile/mongo-keyfile"]
    environment:
      - 'MONGO_INITDB_DATABASE=cop'
      - 'MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}'
      - 'MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-cop}'
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - mongodb_keyfile:/etc/mongo-keyfile:ro
    depends_on:
      mongodb-keyfile:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch(e) { 0 }\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - >
        for i in {1..60}; do
          mongosh "mongodb://${MONGO_ROOT_USERNAME:-cop}:${MONGO_ROOT_PASSWORD:-cop_dev_password_change_me}@mongodb:27017/admin?authSource=admin" --quiet --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }" && exit 0;
          sleep 1;
        done;
        echo "Mongo replica set init failed" && exit 1;

volumes:
  mongodb_data:
  mongodb_keyfile:
